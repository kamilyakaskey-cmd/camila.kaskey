<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — Camila Kaskey</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg: #FFFFFF;
  --ink: #222222;
  --ink-soft: #666666;
  --line: #E4E4E2;
  --serif: 'Lora', serif;
  --sans: 'Inter', sans-serif;
  --display: 'Anton', sans-serif;
}

*{ box-sizing: border-box; margin:0; padding:0; }
html{ scroll-behavior: smooth; }
body{
  background: var(--bg);
  color: var(--ink);
  font-family: var(--sans);
  line-height: 1.7;
  -webkit-font-smoothing: antialiased;
}
@media (prefers-reduced-motion: reduce){
  *{ animation:none !important; transition:none !important; }
  html{ scroll-behavior:auto; }
}
a{ color: inherit; text-decoration: underline; text-underline-offset: 2px; text-decoration-color: var(--line); }
a:hover{ text-decoration-color: var(--ink); }
img{ max-width:100%; display:block; }
.wrap{ max-width: 760px; margin:0 auto; padding: 0 28px; }
em, i, .italic{ font-style: italic; }

/* ---------- Top nav (plain, subpages) ---------- */
.topbar{ padding: 26px 0 20px; text-align:center; border-bottom: 1px solid var(--line); }
.brand{
  font-family: var(--serif); font-size: 1.05rem; letter-spacing: 0.02em;
  text-decoration:none; display:block; margin-bottom: 16px;
}
nav.main-nav{ display:flex; gap: 26px; justify-content:center; flex-wrap: wrap; margin-bottom: 14px; }
nav.main-nav a{
  font-size: 0.82rem; text-transform: uppercase; letter-spacing: 0.08em;
  text-decoration:none; color: var(--ink-soft); padding-bottom: 3px;
  border-bottom: 1px solid transparent; transition: color .15s ease, border-color .15s ease;
}
nav.main-nav a:hover, nav.main-nav a.active{ color: var(--ink); border-color: var(--ink); }

.social-icons{ display:flex; gap: 16px; justify-content:center; }
.social-icons a{ color: var(--ink-soft); text-decoration:none; }
.social-icons a:hover{ color: var(--ink); }
.social-icons svg{ width: 16px; height: 16px; }

/* ---------- Full-bleed dark hero (home page only) ---------- */
.hero-full{
  min-height: 100vh;
  background:
    linear-gradient(180deg, rgba(8,10,12,0.55) 0%, rgba(8,10,12,0.35) 35%, rgba(8,10,12,0.75) 100%),
    repeating-linear-gradient(0deg, rgba(255,255,255,0.05) 0 1px, transparent 1px 64px),
    repeating-linear-gradient(90deg, rgba(255,255,255,0.05) 0 1px, transparent 1px 64px),
    radial-gradient(ellipse at 50% 100%, #2b3542 0%, #12161c 55%, #05070a 100%);
  color: #fff;
  display:flex; flex-direction: column;
  position: relative;
}
.hero-nav{
  display:flex; align-items:center; justify-content:space-between;
  padding: 26px 40px; flex-wrap: wrap; gap: 16px;
}
.hero-brand{
  font-family: var(--display); font-size: 1.05rem; letter-spacing: 0.03em;
  color: #fff; text-decoration:none; text-transform: uppercase;
}
.hero-nav-links{ display:flex; gap: 34px; flex-wrap: wrap; }
.hero-nav-links a{
  font-family: var(--serif); font-size: 1rem; color: rgba(255,255,255,0.82);
  text-decoration:none; padding-bottom: 4px; border-bottom: 1px solid transparent;
  transition: color .15s ease, border-color .15s ease;
}
.hero-nav-links a:hover, .hero-nav-links a.active{ color:#fff; border-color: #fff; }
.hero-social{ display:flex; gap: 16px; }
.hero-social a{ color: rgba(255,255,255,0.82); text-decoration:none; }
.hero-social a:hover{ color:#fff; }
.hero-social svg{ width: 17px; height: 17px; }

.hero-photo-note{
  position: absolute; bottom: 18px; right: 24px;
  font-size: 0.7rem; letter-spacing: 0.08em; text-transform: uppercase;
  color: rgba(255,255,255,0.4);
}

.hero-center{
  flex: 1; display:flex; flex-direction: column; align-items:center; justify-content: flex-end;
  text-align:center; padding: 40px 24px 90px;
}
.hero-headline{
  font-family: var(--display); font-weight: 400; text-transform: uppercase;
  font-size: clamp(2.6rem, 8vw, 5.5rem); line-height: 1.02; letter-spacing: 0.01em;
}
.hero-sub{
  margin-top: 26px; font-size: clamp(1rem, 1.6vw, 1.25rem); color: rgba(255,255,255,0.88);
  max-width: 46ch; font-family: var(--sans); font-weight: 400;
}

@media (max-width: 640px){
  .hero-nav{ flex-direction: column; align-items:center; text-align:center; }
  .hero-nav-links{ justify-content:center; gap: 18px; }
}

/* ---------- Resume category labels ---------- */
.cat-label{
  display:inline-block; font-family: 'IBM Plex Mono', monospace; font-size: 0.72rem;
  text-transform: uppercase; letter-spacing: 0.1em; background: #F2F1ED; color: var(--ink);
  padding: 5px 12px; margin-top: 34px;
}
.cat-label:first-of-type{ margin-top: 0; }

/* ---------- Hero banner photo ---------- */
.hero-photo{
  width:100%; aspect-ratio: 21/9; background: #EFEFEC;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap: 8px;
  border-bottom: 1px solid var(--line);
}
.hero-photo svg{ width: 30px; height:30px; color: var(--ink-soft); opacity:.45; }
.hero-photo span{ font-size: 0.8rem; color: var(--ink-soft); }

/* ---------- Page content ---------- */
main{ padding: 56px 0 90px; }
main .wrap > * + *{ margin-top: 30px; }

h1{
  font-family: var(--serif); font-weight: 400; font-size: clamp(2rem, 5vw, 2.6rem);
  line-height: 1.15; text-align:center;
}
h2{
  font-family: var(--serif); font-weight: 400; font-size: 1.5rem; text-align:center;
}
h3{
  font-family: var(--serif); font-weight: 400; font-size: 1.25rem; margin-top: 40px !important;
}
p{ color: var(--ink-soft); max-width: 62ch; }
p.lede{ font-weight: 500; color: var(--ink); text-align:center; max-width: 56ch; margin: 0 auto; font-size: 1.05rem; }
p.center{ text-align:center; max-width: 56ch; margin-left:auto; margin-right:auto; }
p.caption{ font-style: italic; font-size: 0.92rem; text-align:center; color: var(--ink-soft); margin-top: 10px !important; }
p.quote{ font-style: italic; font-size: 1.15rem; text-align:center; color: var(--ink); max-width: 46ch; margin: 0 auto; }
p.attribution{ text-align:center; font-style: italic; font-size: 0.9rem; color: var(--ink-soft); margin-top: 6px !important; }

.inline-photo{
  width:100%; aspect-ratio: 16/10; background: #EFEFEC;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px;
}
.inline-photo.square{ aspect-ratio: 1/1; max-width: 360px; margin: 0 auto; }
.inline-photo svg{ width: 26px; height:26px; color: var(--ink-soft); opacity:.45; }
.inline-photo span{ font-size: 0.78rem; color: var(--ink-soft); }

/* ---------- Portfolio list ---------- */
.portfolio-item{ padding-top: 46px; border-top: 1px solid var(--line); }
.portfolio-item:first-of-type{ border-top: none; padding-top: 0; }
.portfolio-item .inline-photo{ aspect-ratio: 16/9; }

/* ---------- Resume ---------- */
form.contact-form input:focus, form.contact-form textarea:focus{ outline: 1px solid var(--ink); }
form.contact-form textarea{ min-height: 120px; resize: vertical; }
form.contact-form .submit-link{
  align-self:center; text-align:center; text-transform: uppercase; letter-spacing: 0.08em;
  font-size: 0.85rem; border: 1px solid var(--ink); padding: 11px 26px; text-decoration:none;
}
form.contact-form .submit-link:hover{ background: var(--ink); color:#fff; }
.contact-info-list{ list-style:none; text-align:center; }
.contact-info-list li{ margin-bottom: 10px; font-size: 0.95rem; }
.contact-info-list .label{ display:block; font-size: 0.72rem; text-transform:uppercase; letter-spacing:0.08em; color: var(--ink-soft); margin-bottom: 2px; }

/* ---------- Footer ---------- */
footer{ border-top: 1px solid var(--line); padding: 34px 0; }
.footer-inner{ display:flex; flex-direction:column; align-items:center; gap: 14px; text-align:center; }
.footer-nav{ font-size: 0.82rem; }
.footer-nav a{ text-decoration:none; color: var(--ink-soft); }
.footer-nav a:hover{ color: var(--ink); }
.footer-nav .sep{ color: var(--line); margin: 0 8px; }
.footer-bottom{ font-size: 0.78rem; color: var(--ink-soft); }

/* reveal */
.reveal{ opacity:0; transform: translateY(12px); transition: opacity .6s ease, transform .6s ease; }
.reveal.in{ opacity:1; transform: translateY(0); }

</style>
</head>
<body>

<div class="topbar">
  <a class="brand" href="index.html">Camila Kaskey — Mechanical Engineering Student</a>
  <nav class="main-nav">
    <a href="index.html">Home</a>
    <a href="portfolio.html">Portfolio</a>
    <a href="resume.html">Resume</a>
    <a href="contact.html" class="active">Contact</a>
  </nav>
  <div class="social-icons">
    <a href="https://linkedin.com/in/camila-kaskey-653ba1385" target="_blank" rel="noopener" aria-label="LinkedIn">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M4.98 3.5C4.98 4.88 3.87 6 2.5 6S0 4.88 0 3.5 1.12 1 2.5 1s2.48 1.12 2.48 2.5zM.5 8.75h4V23h-4V8.75zM8.5 8.75h3.83v1.95h.05c.53-1 1.84-2.06 3.79-2.06 4.06 0 4.81 2.67 4.81 6.14V23h-4v-6.42c0-1.53-.03-3.5-2.13-3.5-2.14 0-2.47 1.67-2.47 3.39V23h-4V8.75z"/></svg>

    <a href="mailto:kamilyak@buffalo.edu" aria-label="Email">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 6l10 7 10-7"/></svg>
    </a>
  </div>
</div>

<main>
  <div class="wrap">
    <h2>Contact me directly &gt;</h2>

    <form class="contact-form reveal" onsubmit="return false;">
      <div>
        <label for="name">Name</label>
        <input type="text" id="name" name="name" placeholder="Your name">
      </div>
      <div>
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="your.email@example.com">
      </div>
      <div>
        <label for="message">Message</label>
        <textarea id="message" name="message" placeholder="Say hello..."></textarea>
      </div>
      <a class="submit-link" href="mailto:kamilyak@buffalo.edu">Send</a>
    </form>

    <ul class="contact-info-list reveal">
      <li><span class="label">Email</span><a href="mailto:kamilyak@buffalo.edu">kamilyak@buffalo.edu</a></li>
      <li><span class="label">Phone</span><a href="tel:+17165241101">(716) 524-1101</a></li>
      <li><span class="label">LinkedIn</span><a href="https://linkedin.com/in/camila-kaskey-653ba1385" target="_blank" rel="noopener">linkedin.com/in/camila-kaskey-653ba1385</a></li>
      <li><span class="label">Location</span>Buffalo, NY</li>
    </ul>
  </div>
</main>

<footer>
  <div class="wrap footer-inner">
    <div class="footer-nav">
      <a href="index.html">Home</a><span class="sep">|</span>
      <a href="portfolio.html">Portfolio</a><span class="sep">|</span>
      <a href="resume.html">Resume</a><span class="sep">|</span>
      <a href="contact.html">Contact</a>
    </div>
    <div class="footer-bottom">© 2026 Camila Kaskey</div>

      <a href="https://linkedin.com/in/camila-kaskey-653ba1385" target="_blank" rel="noopener" aria-label="LinkedIn">

      <a href="mailto:kamilyak@buffalo.edu" aria-label="Email">

      </a>
    </div>
  </div>
</footer>

<script>
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if(entry.isIntersecting){ entry.target.classList.add('in'); observer.unobserve(entry.target); }
    });
  }, { threshold: 0.1 });
  document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
</script>
</body>
</html>
